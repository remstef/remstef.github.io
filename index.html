export function CardElement({ children, title, cardClassName="bg-base-100" }){
  return (
    <div className={twMerge("card m-1 shadow-xl", cardClassName )}>
      <div className="card-body">
        { title ? <h2 className="card-title">{title}</h2> : null }
        { children }
      </div>
    </div>
  );
}

function TimedCardElement({ children, title, cardClassName="bg-base-100", seconds = 5, onHide }) {
  const [state, setState] = useState("visible"); // "visible" | "fading" | "hidden"

  useEffect(() => {
    const fadeStart = setTimeout(() => setState("fading"), (seconds - 0.5) * 1000);
    const hide = setTimeout(() => {
      setState("hidden");
      if (onHide) onHide();
    }, seconds * 1000);
    return () => { clearTimeout(fadeStart); clearTimeout(hide); };
  }, [seconds, onHide]);

  if (state === "hidden") return null;


  return (
    <div className={twMerge(`card m-1 shadow-xl transition-opacity duration-500 ${state === "fading" ? "opacity-0" : "opacity-100"}`, cardClassName )}>
      <div className="card-body">
        { title ? <h2 className="card-title">{title}</h2> : null }
        { children }
      </div>
    </div>
  );
}

export function CollapseElement({ title = "Lorem Ipsum", children = "Lorem Ipsum dolor sit amet", openByDefault=false, titleBoxClassName="hover:bg-base-200", show_open_close_icon=true}){

  }, [ openByDefault ]);
  
  return (    
    <>

      <div 
        className={twMerge("cursor-pointer flex ", titleBoxClassName)}
        onClick={() => setIsOpen(!isOpen)}
      >

          {/* chevron https://heroicons.com/ * /}
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" className={`transition-transform ${isOpen ? 'rotate-180' : ''}`}>
            <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
          </svg>
          */}
            {
              isOpen ?

}


export function MarkdownLoader({ filename }) {

  const [ markdown, setMarkdown ] = React.useState("");
  const [ error, setError ] = React.useState(null);

  useEffect(() => {
    fetch(filename)
      .then(response => {
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        return response.text();
      })
      .then(text => setMarkdown(text))
      .catch(err => {
        console.error('Error loading markdown:', err);
        setError(err.message);
      });
  }, [ filename ]);

  if (error) {
    return (
      <div className="container mx-auto p-4">
        <p className="text-red-500">Error loading markdown: {error}</p>
      </div>
    );
  }

  return (
    <ReactMarkdownConfigured>
      { markdown }
    </ReactMarkdownConfigured>
  );
};

export function HtmlLoader({ filename }) {

  const [ html, setHtml ] = React.useState("");
  const [ error, setError ] = React.useState(null);
  const containerRef = React.useRef(null);

  React.useEffect(() => {
    fetch(filename)
      .then(response => {
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        return response.text();
      })
      .then(text => setHtml(text))
      .catch(err => {
        console.error('Error loading html:', err);
        setError(err.message);
      });
  }, [ filename ]);

  // Execute scripts after HTML is rendered
  React.useEffect(() => {
    if (containerRef.current && html) {
      containerRef.current.innerHTML = html;
      
      // Find and execute script tags
      const scripts = containerRef.current.querySelectorAll('script');
      scripts.forEach(script => {
        try {
          // // Remove export statements which aren't supported in eval
          let code = script.innerHTML.replace(/export\s+(function|const|class)\s+/g, '$1 ');
          
          if (script.type === 'text/babel') {
            // Transform JSX to JavaScript using Babel
            const transformed = window.Babel.transform(code, {
              presets: ['react']
            }).code;
            // Execute the transformed code
            eval(transformed);
          } else {
            // Execute regular JavaScript
            eval(code);
          }
        } catch (err) {
          console.error('Error executing script:', err, script.innerHTML);
        }
      });
    }
  }, [html]);

  if (error) {
    return (
      <div className="container mx-auto p-4">
        <p className="text-red-500">Error loading html: {error}</p>
      </div>
    );
  }

  return (
    <div ref={containerRef} />
  );
};

export function GenericAlert({ id, type = "info", message, onClose, isExiting = false }) {
  const typeClass = {
    info: "alert-info",
    warning: "alert-warning",
    error: "alert-error",
    success: "alert-success",
  }[type] || "alert-info";
  const typeIcon = {
    info: <AlertInfoIcon />,
    warning: <AlertWarningIcon />,
    error: <AlertErrorIcon />,
    success: <AlertSuccessIcon />,
  }[type] || <AlertInfoIcon />

  return (
    <div 
      className={`alert ${typeClass} shadow-lg max-w-lg w-full pointer-events-auto ${
        isExiting ? 'alert-fade-out' : 'alert-slide-in'
      }`}
      role="alert"
      title="Dismiss"
      onClick={() => onClose(id)}
    >
      {typeIcon}
      <span className="flex-1">{message}</span>
    </div>
  );
}

export function MainApp() {
  const [activeTab, setActiveTabState] = useState(() => {
    const url = new URL(location.href);
    return url.searchParams.has('tab') ? url.searchParams.get('tab') : defaultTab;
  });
  
  setActiveTab = (tab, skipNewHistoryEntry=false) => {
    if (tab){
      const url = new URL(location.href);
      url.searchParams.set('tab', tab);
      // change title
      document.title = `${theProtagonistsName} - ${tab}`
      if (!skipNewHistoryEntry) {
        history.pushState({tab: tab}, '', url); // to update browser address and history without reload
      }
    }else{
      // update the url in the address bar to remove search params and the # (hash)
      const { origin, pathname, search } = location;
      tab = defaultTab;
      document.title = `${theProtagonistsName}`
      if (!skipNewHistoryEntry) {
        history.pushState({ }, '', origin + pathname); // to update browser address without reload
      }
    }
    setActiveTabState(tab);
  };
  getActiveTab = () => activeTab || defaultTab;


  const [ theme, _setTheme ] = useState(defaultLightTheme);
  changeTheme = (newTheme) => {
    _setTheme(newTheme);
    document.body.setAttribute("data-theme", newTheme);
    localStorage.setItem("theme", newTheme);
  };
  // make variables and functions globally available
  getActiveTheme = () => theme;

  const [ listOfActiveAlerts, setListOfActiveAlerts ] = useState([]);

  // Add an alert
  showAlert = ({ type = "info", message, autoDismissSeconds=8 }) => {
    const id = Date.now() + Math.random();
    setListOfActiveAlerts((prev) => [...prev, { id, type, message, isExiting: false }]);
    // Auto-dismiss after X seconds:
    setTimeout(() => removeAlert(id), autoDismissSeconds*1000);
  }

  // Remove an alert (triggers fade-out animation first)
  function removeAlert(id) {
    setListOfActiveAlerts((prev) => 
      prev.map(a => a.id === id ? { ...a, isExiting: true } : a)
    );
    // Wait for fade-out animation to complete before removing
    setTimeout(() => {
      setListOfActiveAlerts((prev) => prev.filter(a => a.id !== id));
    }, 500);
  }

  // on initialization do
  useEffect(() => {    
    // Check localStorage for the saved theme
    const savedTheme = localStorage.getItem("theme");
    if (savedTheme) {
      changeTheme(savedTheme);
    } else {
      // Fall back to system preference or default
      if (defaultTheme != null){
        changeTheme(defaultTheme);
      } else {
      const userPrefersDarkTheme = window.matchMedia("(prefers-color-scheme: dark)").matches;
      if (userPrefersDarkTheme){
        changeTheme(defaultDarkTheme);
      } else {
        changeTheme(defaultLightTheme);
      }
      }
      
    }

    // make an alert appear after 3 seconds, and disappear after 3 seconds again
    if (showConstructionAlert){
      setTimeout(
        () => showAlert({ 
          type: "info", 
          message: "Note, this site is under construction and might not be complete.", 
          autoDismissSeconds: 3 
        }), 3000
      );
    }

    // handle browser history events
    const onPopState = (event) => {
      // event.state is the state object from pushState/replaceState
      let tab = null;
      if (event.state && 'tab' in event.state){
        tab = event.state['tab'];
      }
      setActiveTab(tab, true);
    };
    
    addEventListener('popstate', onPopState);
    
    return () => removeEventListener('popstate', onPopState);

  },[ ]);


  return (
    <div className="flex flex-col h-screen bg-base-200">
      {/* Keep Modals And Alerts Here */}  
      {/* Alerts */}
      <div className="fixed top-20 right-2 z-50 max-w-lg w-1/2">
        {listOfActiveAlerts.map(alert => (
          <GenericAlert key={alert.id} {...alert} onClose={removeAlert} />
        ))}
      </div>
      {/* variants for positioning 
        // top right
        <div className="fixed top-20 right-2 z-50 max-w-lg w-1/2">
          ...
        </div>
        // modal style shadow centered
        <>
          <div className="fixed inset-0 bg-black/50 z-40" />
          <div className="fixed inset-0 flex items-center justify-center z-50 ">
            ...
          </div>
        <>
        // bottom centered
        <div className="fixed left-1/2 transform -translate-x-1/2 bottom-1/4 z-50">
          ...
        </div>
        // centered
        <div className="fixed inset-0 flex items-center justify-center z-50 pointer-events-none">
          ...
        </div>
        */}

      {/* Header */}
      <header className="bg-base-100 shadow-sm flex-shrink-0">
        <Navigation />
      </header>
      
      {/* Main*/}
      <main className="flex-1 overflow-y-auto m-1">
        <div className="flex justify-center p-4">
          { activeTab in tabs ? tabs[activeTab]() : tabs[defaultTab]() }
        </div>

}
